  if(S.phase!=="offseason") return;
  const offStart = GAME.CFP_TITLE_WEEK+1;
  if(S.week!==offStart && S.week!==offStart+1) return;

  if(S.ui._portalShownWeek===S.week) return;
  S.ui._portalShownWeek=S.week;

  const offers=S.portal.offers||[];
  const cur=getTeam(S.teamId);
  const html = `
    <div class="itemCard">
      <div class="itemTitle">Transfer Portal</div>
      <div class="itemMeta">Rule: You can transfer anywhere. You’ll still have to win the job in the position battle.</div>
      <div class="itemMeta">Current: <span class="badge bAcc2">${U.safe(cur.name)}</span></div>
    </div>
    <div class="sep"></div>
    <div class="list">
      ${offers.map(o=>{
        const t=getTeam(o.teamId);
        return `
          <div class="itemCard">
            <div class="itemTop">
              <div>
                <div class="itemTitle">${U.safe(t.name)} <span class="badge bAcc2">${U.safe(t.conf)}</span></div>
                <div class="itemMeta">Prest ${t.prestige} • Team OVR ${t.ovr} • Fit ${o.fit}/100</div>
              </div>
              <button class="btnGood" data-act="portal_pick" data-team="${t.id}">Transfer</button>
            </div>
          </div>
        `;
      }).join("")}
    </div>
    <div class="hint">If you stay put, just ignore this and keep advancing.</div>
  `;
  queueModal({type:"html", title:"PORTAL OFFERS", icon:"🚪", line:"Optional transfer.", html});
}

/* ==========================================================
  Actions
========================================================== */
async function handle(act, el){
  try{
    if(act==="drawer_open"){ drawerOpen(); return; }
    if(act==="drawer_close"){ drawerClose(); return; }

    if(act==="new_game"){ newGame(); await save(); toast("New Game","RTG created.","good"); render(); return; }

    if(act==="load"){
      const v=await loadSave();
      if(!v){ toast("No Save","No save found.","bad"); return; }
      S=v;

      // backfill
      S.polls ??= { apTop25:[], cfpTop25:[] };
      S.hs ??= { log:[] };
      S.recruiting ??= { offers:[], committedTeamId:null };
      S.college ??= { schedule:[], postBuilt:false };
      S.post ??= { cfp:null };
      S.portal ??= { entered:false, offers:[] };
      S.records ??= { book:initRecordBook(), pending:[] };
      S.settings ??= { difficulty:1.05, xpMult:1, infiniteAttrPoints:false, injuriesOn:true, keyMomentsOn:true };
      S.meta ??= { year:2026, startedCollege:false, collegeYearIdx:0 };
      S.ui ??= { modalQueue:[], rankView:"ap", _portalShownWeek:null };
      if(!S.records.book) S.records.book=initRecordBook();
      if(!S.records.pending) S.records.pending=[];
      if(!S.league?.teams?.length) S.league={teams:buildLeague()};

      // ensure schedule moment fields exist
      if(S.college?.schedule?.length){
        for(const g of S.college.schedule){
          g.momentsPlayed ??= false;
          g.momentsLog ??= [];
          g.momentBonus ??= { score:0, line:{} };
          g.moments ??= null;
        }
      }

      if(S.player) refreshAbilityUnlocks();
      computePolls();

      toast("Loaded","Save loaded.","good");
      render();
      return;
    }

    if(act==="save"){ await save(); toast("Saved","Saved.","good"); render(); return; }
    if(act==="hard_reset"){ await hardReset(); toast("Reset","Save deleted.","warn"); render(); return; }

    if(act==="tab"){ activeTab=el.dataset.tab; drawerClose(); render(); return; }

    if(act==="rank_view"){ S.ui.rankView=el.dataset.view||"ap"; await save(); render(); return; }

    if(act==="modal_ack"){ clearModal(); await save(); render(); return; }

    if(act==="modal_end_reset"){
      await hardReset();
      newGame();
      await save();
      toast("Restarted","Fresh RTG started.","good");
      render();
      return;
    }

    if(act==="create_player"){
      const name=(document.getElementById("p_name")?.value||"").trim() || genName();
      const pos=document.getElementById("p_pos")?.value || "QB";
      const stars=parseInt(document.getElementById("p_stars")?.value||"3",10);
      const arch=document.getElementById("p_arch")?.value || baseArchetypes(pos)[0]?.id;

      S.player=initPlayer({name,pos,archId:arch,stars});
      S.phase="hs";
      S.week=1;
      S.hs.log=[];
      toast("RTG Started", "HS senior year begins.", "good");
      await save(); render(); return;
    }

    if(act==="commit"){
      const tid=el.dataset.team;
      commitToSchool(tid);
      await save(); render(); return;
    }

    if(act==="advance" || act==="sim"){
      advance();
      await save();
      render();
      return;
    }

    if(act==="inc_attr"){
      const key=el.dataset.key;
      spendAttrPoint(key);
      await save(); render(); return;
    }

    if(act==="toggle_abil"){
      const kind=el.dataset.kind;
      const id=el.dataset.id;
      const P=S.player;
      const slots=slotsForYear(S.meta.collegeYearIdx||0);

      if(kind==="physical"){
        if(!P.unlocked.physical[id]) return toast("Locked","Unlock requirements not met.","bad");
        const eq=P.equipped.physical.includes(id);
        if(eq){
          P.equipped.physical = P.equipped.physical.filter(x=>x!==id);
          toast("Unequipped","Physical ability removed.","warn");
        } else {
          if(P.equipped.physical.length>=slots.phys) return toast("No Slots", `Physical slots full (${slots.phys}).`, "bad");
          P.equipped.physical.push(id);
          toast("Equipped","Physical ability equipped.","good");
        }
      } else {
        if(!P.unlocked.mental[id]) return toast("Locked","Unlock requirements not met.","bad");
        const eq=P.equipped.mental.includes(id);
        if(eq){
          P.equipped.mental = P.equipped.mental.filter(x=>x!==id);
          toast("Unequipped","Mental ability removed.","warn");
        } else {
          if(P.equipped.mental.length>=slots.ment) return toast("No Slots", `Mental slots full (${slots.ment}).`, "bad");
          P.equipped.mental.push(id);
          toast("Equipped","Mental ability equipped.","good");
        }
      }
      await save(); render(); return;
    }

    if(act==="save_settings"){
      S.settings.difficulty = parseFloat(document.getElementById("set_diff")?.value||"1.05");
      S.settings.xpMult = parseFloat(document.getElementById("set_xp")?.value||"1");
      S.settings.infiniteAttrPoints = (document.getElementById("set_inf")?.value==="1");
      S.settings.injuriesOn = (document.getElementById("set_inj")?.value==="1");
      S.settings.keyMomentsOn = (document.getElementById("set_km")?.value==="1");
      if(S.player && S.settings.infiniteAttrPoints){
        S.player.attrPoints=999;
        S.player.xp=0;
      }
      toast("Settings Saved","Applied.", "good");
      await save(); render(); return;
    }

    if(act==="show_playoff_scores"){
      playoffScorePopup();
      await save(); render(); return;
    }

    if(act==="portal_pick"){
      const tid=el.dataset.team;
      portalTransfer(tid);
      await save(); render(); return;
    }

    if(act==="play_moments"){
      if(!canPlayMomentsNow()) return toast("Key Moments", "Not available right now.", "warn");
      openKeyMomentsModal();
      await save(); render(); return;
    }

    if(act==="moment_pick"){
      const game=currentUserGame();
      if(!game) return;
      applyMomentChoice(game, el.dataset.mid, el.dataset.choice);
      clearModal();
      openKeyMomentsModal();
      await save(); render(); return;
    }

    if(act==="moment_skip_all"){
      const game=currentUserGame();
      if(!game) return;
      skipAllMomentsThisGame(game);
      clearModal();
      await save(); render(); return;
    }

  }catch(e){
    console.error(e);
    toast("Runtime Error", e?.message||"Unknown error", "bad");
  }
}

/* ==========================================================
  Click Routing + Boot
========================================================== */
document.addEventListener("click",(e)=>{
  const bg = e.target?.id==="drawer" ? e.target : null;
  if(bg && bg.classList.contains("drawerOverlay") && bg.classList.contains("open")){
    if(e.target===bg) drawerClose();
    return;
  }
  const el = e.target.closest("[data-act]");
  if(!el) return;
  handle(el.dataset.act, el).then(()=>{});
});

document.addEventListener("change",(e)=>{
  if(!e.target) return;
  if(e.target.id==="p_pos") populateArchetypes();
});

(async function boot(){
  const loaded = await loadSave();
  if(loaded) S=loaded;

  if(!S){
    render();
    return;
  }

  // backfill
  S.polls ??= { apTop25:[], cfpTop25:[] };
  S.hs ??= { log:[] };
  S.recruiting ??= { offers:[], committedTeamId:null };
  S.college ??= { schedule:[], postBuilt:false };
  S.post ??= { cfp:null };
  S.portal ??= { entered:false, offers:[] };
  S.records ??= { book:initRecordBook(), pending:[] };
  S.settings ??= { difficulty:1.05, xpMult:1, infiniteAttrPoints:false, injuriesOn:true, keyMomentsOn:true };
  S.meta ??= { year:2026, startedCollege:false, collegeYearIdx:0 };
  S.ui ??= { modalQueue:[], rankView:"ap", _portalShownWeek:null };
  if(!S.records.book) S.records.book=initRecordBook();
  if(!S.records.pending) S.records.pending=[];
  if(!S.league?.teams?.length) S.league={teams:buildLeague()};
  if(S.player) refreshAbilityUnlocks();

  if(S.college?.schedule?.length){
    for(const g of S.college.schedule){
      g.momentsPlayed ??= false;
      g.momentsLog ??= [];
      g.momentBonus ??= { score:0, line:{} };
      g.moments ??= null;
    }
  }

  computePolls();
  render();
  maybeInjectPortalUI();
})();

const _origRender = render;
render = function(){
  _origRender();
  maybeInjectPortalUI();
};
</script>
