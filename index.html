<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>CFB RTG Sim (Offline) — Single Player</title>
  <style>
    :root{
      --bg:#0a0f16; --text:#eaf2ff; --muted:#a8bbd6;
      --line:#263a55;
      --good:#4ee08a; --warn:#ffd166; --bad:#ff5d5d;
      --accent:#63b3ff; --accent2:#b58cff; --accent3:#7CFFB2;
      --shadow: 0 14px 34px rgba(0,0,0,.38);
      --safeTop: env(safe-area-inset-top, 0px); --safeBot: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(99,179,255,.17), transparent 60%),
        radial-gradient(900px 700px at 85% 0%, rgba(181,140,255,.13), transparent 55%),
        radial-gradient(900px 800px at 40% 90%, rgba(124,255,178,.08), transparent 55%),
        var(--bg);
      color:var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      overflow-x:hidden;
    }
    header{
      position:sticky; top:0; z-index:60;
      background: linear-gradient(180deg, rgba(10,15,22,.96), rgba(10,15,22,.78));
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(38,58,85,.65);
      padding: calc(6px + var(--safeTop)) 10px 6px;
    }
    .topRow{display:flex; gap:10px; align-items:center; justify-content:space-between; max-width:1120px; margin:0 auto;}
    .leftHdr{display:flex; align-items:center; gap:10px; min-width:0}
    .brand{display:flex; flex-direction:column; gap:1px; min-width:0}
    .brand .title{font-weight:950; letter-spacing:.4px; font-size:13px; display:flex; align-items:center; gap:8px; white-space:nowrap;}
    .pill{
      padding:2px 7px;
      border:1px solid rgba(99,179,255,.40);
      background: rgba(99,179,255,.12);
      border-radius:999px;
      font-size:10px; color:var(--accent); font-weight:900;
    }
    .sub{
      color:var(--muted); font-size:11px; line-height:1.2;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width: 64vw;
    }
    .topActions{display:flex; gap:8px; align-items:center; justify-content:flex-end; flex:0 0 auto;}

    button{
      border:1px solid rgba(38,58,85,.92);
      background: linear-gradient(180deg, rgba(18,28,43,.97), rgba(15,22,32,.95));
      color:var(--text);
      border-radius:12px; padding:9px 10px;
      font-weight:900; font-size:12px;
      cursor:pointer; box-shadow: 0 8px 18px rgba(0,0,0,.16); user-select:none;
      transition: transform .05s ease, border-color .15s ease, filter .15s ease;
      touch-action: manipulation;
      white-space:nowrap;
    }
    button:hover{ border-color: rgba(99,179,255,.65); }
    button:active{ transform: translateY(1px); }
    button:disabled{opacity:.45; cursor:not-allowed; filter:saturate(.6);}
    .btnAccent{border-color: rgba(99,179,255,.68); background: linear-gradient(180deg, rgba(99,179,255,.22), rgba(15,22,32,.95));}
    .btnGood{border-color: rgba(78,224,138,.58); background: linear-gradient(180deg, rgba(78,224,138,.18), rgba(15,22,32,.95));}
    .btnDanger{border-color: rgba(255,93,93,.58); background: linear-gradient(180deg, rgba(255,93,93,.18), rgba(15,22,32,.95));}
    .btnWarn{border-color: rgba(255,209,102,.55); background: linear-gradient(180deg, rgba(255,209,102,.14), rgba(15,22,32,.95));}
    .iconBtn{ width:40px; height:40px; padding:0; display:inline-flex; align-items:center; justify-content:center; border-radius:12px; }

    main{ max-width:1120px; margin:0 auto; padding:12px 12px calc(18px + var(--safeBot)); }
    .grid{display:grid; grid-template-columns: 1.15fr .85fr; gap:12px;}
    @media (max-width: 920px){.grid{grid-template-columns:1fr}}

    .card{
      background: linear-gradient(180deg, rgba(18,28,43,.92), rgba(12,18,26,.92));
      border:1px solid rgba(38,58,85,.82);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding:12px;
    }
    .card h2{margin:0 0 8px; font-size:14px; letter-spacing:.35px;}
    .muted{color:var(--muted)}
    .sep{height:1px; background:rgba(38,58,85,.75); margin:10px 0;}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .rowBetween{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
    .chip{
      background: rgba(22,36,55,.92);
      border:1px solid rgba(38,58,85,.82);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px; font-weight:900;
      display:inline-flex; gap:6px; align-items:center;
    }
    .chip .k{color:var(--muted); font-weight:950; font-size:11px; letter-spacing:.2px;}

    input,select,textarea{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(38,58,85,.92);
      background: rgba(10,14,19,.78);
      color:var(--text);
      padding:10px;
      outline:none;
      font-size:13px;
    }
    label{font-size:12px; color:var(--muted); font-weight:950; display:block; margin:8px 0 6px;}
    .hint{font-size:11px; color:var(--muted); margin-top:6px; line-height:1.28;}
    .badge{
      padding:3px 8px; border-radius:999px;
      font-size:11px; font-weight:950;
      border:1px solid rgba(38,58,85,.88);
      background: rgba(22,36,55,.75);
      display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
    }
    .bGood{border-color: rgba(78,224,138,.52); color: rgba(170,255,212,1); background: rgba(78,224,138,.11);}
    .bBad{border-color: rgba(255,93,93,.52); color: rgba(255,182,182,1); background: rgba(255,93,93,.10);}
    .bWarn{border-color: rgba(255,209,102,.52); color: rgba(255,241,192,1); background: rgba(255,209,102,.12);}
    .bAcc{border-color: rgba(99,179,255,.62); color: rgba(200,230,255,1); background: rgba(99,179,255,.12);}
    .bAcc2{border-color: rgba(181,140,255,.62); color: rgba(230,212,255,1); background: rgba(181,140,255,.12);}
    .bAcc3{border-color: rgba(124,255,178,.62); color: rgba(198,255,228,1); background: rgba(124,255,178,.10);}

    .progress{height:10px; border-radius:999px; border:1px solid rgba(38,58,85,.88); background: rgba(10,14,19,.82); overflow:hidden;}
    .bar{height:100%; width:0%; background: linear-gradient(90deg, rgba(99,179,255,.95), rgba(181,140,255,.95));}

    .toasts{position:fixed; top: calc(52px + var(--safeTop)); right: 10px; z-index: 90; display:flex; flex-direction:column; gap:8px; max-width: 92vw; pointer-events:none;}
    .toast{pointer-events:none; background: rgba(18,28,43,.92); border:1px solid rgba(38,58,85,.92); border-left:5px solid rgba(99,179,255,.85); border-radius: 12px; padding: 10px 12px; box-shadow: var(--shadow); font-size: 12px; line-height: 1.25; max-width: 460px;}
    .toast.good{border-left-color: rgba(78,224,138,.92);}
    .toast.bad{border-left-color: rgba(255,93,93,.92);}
    .toast.warn{border-left-color: rgba(255,209,102,.92);}
    .toast .t{font-weight:950; margin-bottom:2px;}
    .toast .s{color:var(--muted)}

    .twoCol{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width: 640px){ .twoCol{grid-template-columns:1fr;} .sub{max-width:56vw} }
    .mini{font-size:11px}

    .overlay{
      position:fixed; inset:0; z-index:140;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(6px);
      display:flex; align-items:center; justify-content:center;
      padding: 14px;
    }
    .modal{
      width:min(760px, 96vw);
      border-radius: 18px;
      border:1px solid rgba(38,58,85,.92);
      box-shadow: 0 20px 80px rgba(0,0,0,.55);
      background:
        radial-gradient(900px 300px at 10% 0%, rgba(99,179,255,.22), transparent 55%),
        radial-gradient(900px 300px at 90% 0%, rgba(181,140,255,.18), transparent 55%),
        linear-gradient(180deg, rgba(18,28,43,.96), rgba(12,18,26,.96));
      padding: 14px;
      max-height: calc(92vh - var(--safeTop) - var(--safeBot));
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }
    .hero{
      border-radius: 14px;
      border:1px solid rgba(99,179,255,.42);
      background: linear-gradient(90deg, rgba(99,179,255,.20), rgba(181,140,255,.18));
      padding: 12px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .hero .big{font-size: 15px; font-weight: 1000; letter-spacing:.2px; line-height:1.15;}
    .hero .subt{font-size: 12px; font-weight: 950; color: rgba(255,241,192,1);}
    .hero .logo{font-size: 28px; filter: drop-shadow(0 10px 20px rgba(0,0,0,.35));}

    .drawerOverlay{
      position:fixed; inset:0; z-index:120;
      background: rgba(0,0,0,.42);
      backdrop-filter: blur(6px);
      display:none;
    }
    .drawerOverlay.open{display:block;}
    .drawer{
      position:fixed; top:0; left:0;
      height:100%;
      width:min(340px, 90vw);
      padding: calc(10px + var(--safeTop)) 12px 12px;
      background: linear-gradient(180deg, rgba(18,28,43,.98), rgba(12,18,26,.98));
      border-right:1px solid rgba(38,58,85,.82);
      box-shadow: 24px 0 80px rgba(0,0,0,.55);
      transform: translateX(-105%);
      transition: transform .18s ease;
      display:flex; flex-direction:column; gap:10px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }
    .drawerOverlay.open .drawer{transform: translateX(0);}
    .drawerHdr{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .drawerTitle{font-weight:1000; letter-spacing:.3px;}
    .navList{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
    .navItem{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:14px;
      border:1px solid rgba(38,58,85,.86);
      background: rgba(18,28,43,.62);
      color:var(--muted);
      cursor:pointer; user-select:none; touch-action: manipulation;
    }
    .navItem .l{display:flex; align-items:center; gap:10px; font-weight:950; color:inherit;}
    .navItem.active{color:var(--text); border-color: rgba(99,179,255,.68); background: rgba(99,179,255,.12);}

    @media (max-width: 520px){ .hideOnPhone{display:none !important;} .sub{max-width:56vw} }

    .list{display:flex; flex-direction:column; gap:10px;}
    .itemCard{
      border-radius: 14px;
      border: 1px solid rgba(38,58,85,.82);
      background: linear-gradient(180deg, rgba(18,28,43,.82), rgba(12,18,26,.82));
      padding: 10px;
    }
    .itemTop{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    }
    .itemTitle{font-weight: 1000; line-height: 1.15; font-size: 13px;}
    .itemMeta{
      margin-top:4px;
      display:flex; flex-wrap:wrap; gap:6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
    .bracket{display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:10px;}
    @media (max-width: 920px){ .bracket{grid-template-columns:1fr} }
    .roundHdr{font-weight:1000; letter-spacing:.2px; margin-bottom:6px;}
  </style>
</head>
<body>
<header>
  <div class="topRow">
    <div class="leftHdr">
      <button class="iconBtn" data-act="drawer_open" aria-label="Menu">☰</button>
      <div class="brand">
        <div class="title">🏈 Road to Glory Sim <span class="pill">OFFLINE</span></div>
        <div class="sub" id="subLine">Loading…</div>
      </div>
    </div>
    <div class="topActions">
      <button class="btnAccent" data-act="advance">Advance</button>
      <button class="hideOnPhone" data-act="sim">Sim</button>
      <button class="hideOnPhone btnGood" data-act="save">Save</button>
    </div>
  </div>
</header>

<div class="toasts" id="toasts"></div>

<div class="drawerOverlay" id="drawer">
  <div class="drawer" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <div class="drawerHdr">
      <div class="drawerTitle">Menu</div>
      <button class="iconBtn" data-act="drawer_close" aria-label="Close">✕</button>
    </div>

    <div class="card" style="padding:10px; background:rgba(18,28,43,.55)">
      <div class="row" style="gap:8px">
        <button class="btnAccent" style="flex:1" data-act="advance">Advance</button>
        <button style="flex:1" data-act="sim">Sim</button>
      </div>
      <div class="row" style="gap:8px; margin-top:8px">
        <button class="btnGood" style="flex:1" data-act="save">Save</button>
        <button class="btnDanger" style="flex:1" data-act="hard_reset">Reset</button>
      </div>
      <div class="hint">Single-player RTG. HS → Scholarships → College → CFP → Awards/Records → Portal.</div>
    </div>

    <div class="navList" id="navList"></div>
  </div>
</div>

<main id="app"></main>
<div id="overlayRoot"></div>

<script>
/* ==========================================================
  CFB RTG SIM (SINGLE FILE)
  CHANGES REQUESTED:
  ✅ Removed Bottom-25 start rule (commit anywhere if offered)
  ✅ Key Moments are now RTG player/position specific (QB/RB/WR-TE/OL/Defense)
  ✅ Keeps everything else intact (CFP, awards, records, portal, settings)
========================================================== */

/* ---------- Utilities ---------- */
const U = {
  clamp:(v,a,b)=>Math.max(a,Math.min(b,v)),
  rint:(a,b)=>Math.floor(a + Math.random()*(b-a+1)),
  pick:(arr)=>arr[Math.floor(Math.random()*arr.length)],
  uuid:()=> (crypto?.randomUUID ? crypto.randomUUID() : ("id"+Math.random().toString(16).slice(2)+Date.now())),
  deepCopy:(o)=>JSON.parse(JSON.stringify(o)),
  safe:(s)=> (s??"").toString().replace(/[<>&"]/g, m=>({ "<":"&lt;", ">":"&gt;", "&":"&amp;", "\"":"&quot;" }[m])),
};

function toast(title, msg, type=""){
  const wrap = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast " + (type||"");
  el.innerHTML = `<div class="t">${U.safe(title)}</div><div class="s">${U.safe(msg)}</div>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transform="translateY(-6px)"; }, 3400);
  setTimeout(()=>{ el.remove(); }, 4100);
}

/* ---------- IndexedDB KV ---------- */
const STORE = (() => {
  const DB_NAME = "cfb_rtg_db_v1";
  const STORE_NAME = "kv";
  let dbPromise = null;

  function openDB(){
    if(dbPromise) return dbPromise;
    dbPromise = new Promise((resolve)=>{
      if(!("indexedDB" in window)) return resolve(null);
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    });
    return dbPromise;
  }

  async function idbGet(key){
    const db = await openDB();
    if(!db) return null;
    return new Promise((resolve)=>{
      const tx = db.transaction(STORE_NAME, "readonly");
      const st = tx.objectStore(STORE_NAME);
      const rq = st.get(key);
      rq.onsuccess = () => resolve(rq.result ?? null);
      rq.onerror = () => resolve(null);
    });
  }

  async function idbSet(key, val){
    const db = await openDB();
    if(!db) return false;
    return new Promise((resolve)=>{
      const tx = db.transaction(STORE_NAME, "readwrite");
      const st = tx.objectStore(STORE_NAME);
      const rq = st.put(val, key);
      rq.onsuccess = () => resolve(true);
      rq.onerror = () => resolve(false);
    });
  }

  async function idbDel(key){
    const db = await openDB();
    if(!db) return false;
    return new Promise((resolve)=>{
      const tx = db.transaction(STORE_NAME, "readwrite");
      const st = tx.objectStore(STORE_NAME);
      const rq = st.delete(key);
      rq.onsuccess = () => resolve(true);
      rq.onerror = () => resolve(false);
    });
  }

  return { get:idbGet, set:idbSet, del:idbDel };
})();

/* ---------- Game Config ---------- */
const GAME = {
  SAVE_KEY: "cfb_rtg_SAVE_v1",
  HS_GAMES: 10,
  REG_GAMES: 12,
  CONF_TITLE_WEEK: 13,
  CFP_R1_WEEK: 14,
  CFP_QF_WEEK: 15,
  CFP_SF_WEEK: 16,
  CFP_TITLE_WEEK: 17,
  YEARS_COLLEGE: 4,
};

/* ---------- Real Conferences ---------- */
const TEAMSET = {
  version: 1,
  conferences: [
    {name:"SEC", prestigeBase:86, teams:["Alabama","Arkansas","Auburn","Florida","Georgia","Kentucky","LSU","Mississippi State","Missouri","Oklahoma","Ole Miss","South Carolina","Tennessee","Texas","Texas A&M","Vanderbilt"]},
    {name:"Big Ten", prestigeBase:86, teams:["Illinois","Indiana","Iowa","Maryland","Michigan","Michigan State","Minnesota","Nebraska","Northwestern","Ohio State","Oregon","Penn State","Purdue","Rutgers","UCLA","USC","Washington","Wisconsin"]},
    {name:"Big 12", prestigeBase:84, teams:["Arizona","Arizona State","Baylor","BYU","Cincinnati","Colorado","Houston","Iowa State","Kansas","Kansas State","Oklahoma State","TCU","Texas Tech","UCF","Utah","West Virginia"]},
    {name:"ACC", prestigeBase:83, teams:["Boston College","Clemson","Duke","Florida State","Georgia Tech","Louisville","Miami","NC State","North Carolina","Notre Dame","Pittsburgh","SMU","Syracuse","Virginia","Virginia Tech","Wake Forest"]},
    {name:"American", prestigeBase:72, teams:["Memphis","Tulane","UTSA","North Texas","UAB","FAU","Rice","Temple","Charlotte","East Carolina","South Florida","Tulsa"]},
    {name:"Mountain West", prestigeBase:70, teams:["Air Force","Boise State","Colorado State","Fresno State","Hawai'i","Nevada","New Mexico","San Diego State","San Jose State","UNLV","Utah State","Wyoming"]},
    {name:"Sun Belt", prestigeBase:66, teams:["Appalachian State","Arkansas State","Coastal Carolina","Georgia Southern","Georgia State","James Madison","Louisiana","Marshall","Old Dominion","South Alabama","Southern Miss","Texas State","Troy"]},
    {name:"MAC", prestigeBase:64, teams:["Akron","Ball State","Bowling Green","Buffalo","Central Michigan","Eastern Michigan","Kent State","Miami (OH)","Northern Illinois","Ohio","Toledo","Western Michigan"]},
    {name:"CUSA", prestigeBase:62, teams:["Liberty","Jacksonville State","Sam Houston","Kennesaw State","Middle Tennessee","Western Kentucky","Louisiana Tech","FIU","UTEP","New Mexico State"]},
    {name:"Independents", prestigeBase:72, teams:["Army","Navy","UConn","UMass"]},

};

const NAME = {
  first:["Jaden","Marcus","DeAndre","Tyrese","Cameron","Ethan","Jaylen","Noah","Kobe","Miles","Dylan","Malik","Zion","Jordan","Caleb","Tre","Bryce","Isaiah","Damian","Aiden","Rashad","Micah","Logan","Colin","Xavier","Julian","Elijah","Gavin","Brandon","Terrence","Carter","Adrian","Nate","Chris","Kevin","Antonio","Kyler","Mason","Grant","Hunter","AJ","RJ","TJ","DJ"],
  last:["Williams","Johnson","Brown","Davis","Miller","Wilson","Moore","Anderson","Thomas","Jackson","White","Harris","Martin","Thompson","Garcia","Martinez","Robinson","Clark","Lewis","Lee","Walker","Hall","Allen","Young","King","Wright","Scott","Green","Baker","Adams","Nelson","Hill","Campbell","Mitchell","Carter","Roberts","Turner","Phillips","Parker","Evans","Edwards","Collins","Stewart","Sanchez","Morris","Rogers","Reed","Cook"],
};
function genName(){ return U.pick(NAME.first)+" "+U.pick(NAME.last); }

/* ---------- Week Labels ---------- */
function weekName(phase, w){
  if(phase==="setup") return "Setup";
  if(phase==="hs") return `HS Game ${w}/${GAME.HS_GAMES}`;
  if(phase==="recruiting") return "Scholarship Week";
  if(phase==="college"){
    if(w>=1 && w<=GAME.REG_GAMES) return `Week ${w} (Reg Season)`;
    if(w===GAME.CONF_TITLE_WEEK) return "Conference Championship Week";
    if(w===GAME.CFP_R1_WEEK) return "CFP First Round";
    if(w===GAME.CFP_QF_WEEK) return "CFP Quarterfinals";
    if(w===GAME.CFP_SF_WEEK) return "CFP Semifinals";
    if(w===GAME.CFP_TITLE_WEEK) return "National Championship";
    const offStart = GAME.CFP_TITLE_WEEK+1;
    if(w===offStart) return "Offseason Wk1 (Awards+Portal)";
    if(w===offStart+1) return "Offseason Wk2 (Portal)";
    if(w===offStart+2) return "Offseason Wk3 (Training)";
    if(w===offStart+3) return "Offseason Wk4 (Position Battle)";
  }
  return `Week ${w}`;
}

/* ==========================================================
   Player Attributes + OVR
========================================================== */
const POS = ["QB","RB","WR","TE","OL","DL","LB","CB","S"];
const CORE = ["SPD","ACC","AGI","STR","STA","INJ"];
const POS_ATTR = {
  QB:["THP","SAC","MAC","DAC","AWR","PBK"],
  RB:["CAR","ELU","BTK","TRK","CTH"],
  WR:["CTH","CIT","SRR","MRR","DRR","REL","SPC"],
  TE:["CTH","CIT","SRR","MRR","REL","SPC","RBP","RBF"],
  OL:["PBF","PBP","RBF","RBP","AWR","STR"],
  DL:["TAK","POW","FIN","BSH","PRC","STR"],
  LB:["TAK","POW","FIN","BSH","PRC","ZCV","MCV","SPD"],
  CB:["TAK","MCV","ZCV","PCV","PRC","SPD","ACC","AGI"],
  S:["TAK","MCV","ZCV","PRC","SPD","ACC","AGI"],
};

function allAttrsForPos(pos){
  const set = new Set([...CORE, ...(POS_ATTR[pos]||[])]);
  return Array.from(set);
}

function baseArchetypes(pos){
  const A = {
    QB: [
      {id:"field_general", name:"Field General", desc:"Acc/AWR baseline, steady under pressure", bias:{SAC:+5, MAC:+5, AWR:+6, PBK:+4, THP:+1, SPD:-1}},
      {id:"gunslinger", name:"Gunslinger", desc:"Big arm + deep shots, more variance", bias:{THP:+7, DAC:+4, PBK:+2, AWR:+1, SAC:-2}},

function calcOVR(pos, attrs){
  const g = (k)=> (attrs[k]??50);
  const W = {
    QB:{THP:0.12,SAC:0.14,MAC:0.14,DAC:0.12,AWR:0.16,PBK:0.10,SPD:0.06,ACC:0.06,AGI:0.06,STR:0.02,STA:0.02},
    RB:{CAR:0.14,ELU:0.14,BTK:0.12,TRK:0.10,CTH:0.08,SPD:0.14,ACC:0.10,AGI:0.10,STR:0.04,STA:0.04},
    WR:{CTH:0.14,CIT:0.10,SRR:0.12,MRR:0.10,DRR:0.10,REL:0.08,SPC:0.08,SPD:0.14,ACC:0.07,AGI:0.05,STA:0.02},
    TE:{CTH:0.12,CIT:0.10,SRR:0.08,MRR:0.06,REL:0.06,SPC:0.06,RBP:0.10,RBF:0.08,STR:0.10,SPD:0.08,ACC:0.06},
    OL:{PBF:0.16,PBP:0.14,RBF:0.14,RBP:0.16,AWR:0.12,STR:0.18,STA:0.10},
    DL:{TAK:0.12,POW:0.16,FIN:0.14,BSH:0.16,PRC:0.10,STR:0.16,SPD:0.08,ACC:0.08},
    LB:{TAK:0.14,POW:0.10,FIN:0.10,BSH:0.12,PRC:0.12,ZCV:0.10,MCV:0.08,SPD:0.12,ACC:0.08,STR:0.04},
    CB:{TAK:0.08,MCV:0.18,ZCV:0.14,PCV:0.14,PRC:0.12,SPD:0.14,ACC:0.10,AGI:0.10},
    S:{TAK:0.12,MCV:0.12,ZCV:0.14,PRC:0.16,SPD:0.14,ACC:0.10,AGI:0.10,STR:0.06,STA:0.06},
  };
  const w = W[pos] || {};
  let sum=0, tot=0;
  for(const [k,wt] of Object.entries(w)){ sum += g(k)*wt; tot += wt; }
  return Math.round(tot ? (sum/tot) : 50);
}

function buildLeague(){
  const teams=[];
  for(const conf of TEAMSET.conferences){
    for(const nm of conf.teams){
      const prestige = U.clamp(conf.prestigeBase + U.rint(-10, +10), 35, 94);
      const ovr = U.clamp(conf.prestigeBase + U.rint(-14, +12), 35, 95);
      const off = U.clamp(ovr + U.rint(-10,+10), 30, 98);
      const def = U.clamp(ovr + U.rint(-10,+10), 30, 98);
      teams.push({
        id:U.uuid(),
        name:nm,
        conf:conf.name,
        prestige,
        ovr, off, def,
        season:{w:0,l:0,pf:0,pa:0,confW:0,confL:0,g:0},
        apRank:999, cfpRank:999,
      });
    }
  }
  return teams;
}

function teamScore(t){
  const g=t.season.g||0;
  const winPct=g?(t.season.w/g):0;
  const margin=g?((t.season.pf-t.season.pa)/g):0;
  return (winPct*120) + (margin*1.8) + (t.prestige*0.45) + (t.ovr*0.25);
}

function computePolls(){
  const ranked=S.league.teams.slice().sort((a,b)=>teamScore(b)-teamScore(a));
  ranked.forEach((t,i)=>t.apRank=i+1);

  const wk = S.week;
  const canCFP = (S.phase==="college" && wk>=9) || (S.phase==="college" && wk>=GAME.CONF_TITLE_WEEK) || (S.phase==="college" && wk>=GAME.CFP_R1_WEEK) || (S.phase==="college" && wk>=GAME.CFP_TITLE_WEEK) || (S.phase==="offseason");
  if(canCFP){
    ranked.forEach((t,i)=>t.cfpRank=i+1);
    S.polls.cfpTop25 = ranked.slice(0,25).map(t=>t.id);
  } else {
    for(const t of S.league.teams) t.cfpRank=999;
    S.polls.cfpTop25 = [];
  }
  S.polls.apTop25 = ranked.slice(0,25).map(t=>t.id);
}

function buildScheduleForTeam(teamId){
  const me = getTeam(teamId);
  const all = S.league.teams.filter(t=>t.id!==teamId);
  const same = all.filter(t=>t.conf===me.conf);
  const other = all.filter(t=>t.conf!==me.conf);
  const picks=[];
  const confOpp = same.slice().sort(()=>Math.random()-0.5).slice(0,8);
  const nonOpp = other.slice().sort(()=>Math.random()-0.5).slice(0,4);
  picks.push(...confOpp.map(t=>({oppId:t.id, confGame:true})));
  picks.push(...nonOpp.map(t=>({oppId:t.id, confGame:false})));
  const shuffled = picks.sort(()=>Math.random()-0.5);
  return shuffled.map((g,i)=>({
    week:i+1,
    home: (Math.random()<0.5),
    oppId:g.oppId,
    confGame:g.confGame,
    played:false,
    mePts:0, oppPts:0,
    playerLine:null,
    injuryNote:"",
    momentsPlayed:false,
    momentsLog:[],
    momentBonus:{ score:0, line:{} },
    moments:null,
  }));
}

/* ==========================================================
  Game sim helpers
========================================================== */
function diff(){ return U.clamp(parseFloat(S?.settings?.difficulty ?? 1.05)||1.05, 0.90, 1.25); }
function randRangeSeason(){ return Math.round(7 * diff()); }
function randRangeCFP(){ return Math.round(4 * diff()); }

function sampleCountFromExpected(expected){
  const base = Math.floor(expected);
  const frac = expected - base;
  return base + (Math.random() < frac ? 1 : 0);
}

function addInto(obj, line){
  obj.passY = (obj.passY||0) + (line.passY||0);
  obj.passTD = (obj.passTD||0) + (line.passTD||0);
  obj.int = (obj.int||0) + (line.int||0);
  obj.rushY = (obj.rushY||0) + (line.rushY||0);
  obj.rushTD = (obj.rushTD||0) + (line.rushTD||0);
  obj.recY = (obj.recY||0) + (line.recY||0);
  obj.recTD = (obj.recTD||0) + (line.recTD||0);
  obj.tkl = (obj.tkl||0) + (line.tkl||0);
  obj.sack = (obj.sack||0) + (line.sack||0);
  obj.defINT = (obj.defINT||0) + (line.defINT||0);
  return obj;
}

function pressurePenalty(P){
  const base = (1 - (P.attrs.AWR||50)/120);
  const hasComposure = (P.equipped.mental||[]).includes("composure");
  return U.clamp(base * (hasComposure?0.65:1.0), 0.05, 0.45);
}
function applyClutchBoost(P, isClutch){
  if(!isClutch) return 1.0;
  const has = (P.equipped.mental||[]).includes("clutch");
  return has ? 1.05 : 1.00;
}

function fatigueAfterTouches(P, touches){
  const sta = P.attrs.STA||50;
  const hasWorkhorse = (P.equipped.physical||[]).includes("workhorse");
  const drain = (touches * (hasWorkhorse?0.42:0.55)) * (1 - sta/140);
  return U.clamp((P.fatigue||0) + drain, 0, 100);
}

function injuryRoll(P, touches){
  if(!S.settings.injuriesOn) return {injured:false, weeks:0, note:""};
  const inj = U.clamp(P.attrs.INJ||60, 35, 99);
  const fatigue = U.clamp(P.fatigue||0, 0, 100);
  const base = 0.018;
  const touchFactor = (touches/28) * 0.020;
  const fatigueFactor = (fatigue/100) * 0.020;
  const injFactor = (1 - inj/120) * 0.030;
  const p = U.clamp(base + touchFactor + fatigueFactor + injFactor, 0.01, 0.12);
  if(Math.random() < p){
    const weeks = U.rint(1, 5);
    const note = weeks<=2 ? "Minor injury" : (weeks<=4 ? "Moderate injury" : "Major injury");
    return {injured:true, weeks, note};
  }
  return {injured:false, weeks:0, note:""};
}

function simTeamVsOpp(team, opp, neutral=false, rr=randRangeSeason()){
  const homeAdv = neutral ? 0 : (team._home?2.6:0);
  const base = 24;
  let expMe = base + (team.off - opp.def)*0.20 + (team.ovr - opp.ovr)*0.12 + homeAdv + U.rint(-rr, rr);
  let expOpp = base + (opp.off - team.def)*0.20 + (opp.ovr - team.ovr)*0.12 + U.rint(-rr, rr);
  expMe = U.clamp(Math.round(expMe), 3, 62);
  expOpp = U.clamp(Math.round(expOpp), 3, 62);
  if(expMe===expOpp) expMe += U.rint(1,4);
  return {me:expMe, opp:expOpp};
}

function playerContribution(P, team, opp, context, extraRisk=0){
  const ovr = P.ovr;
  const pos = P.pos;
  const clutchMult = applyClutchBoost(P, !!context.isClutch);

  const takeoff = (P.equipped.physical||[]).includes("takeoff") ? 1.03 : 1.00;
  const quick = (P.equipped.physical||[]).includes("quickstep") ? 1.03 : 1.00;
  const downhill = (P.equipped.physical||[]).includes("downhill") ? 1.04 : 1.00;
  const strongarm = (P.equipped.physical||[]).includes("strongarm") ? 1.03 : 1.00;
  const anchor = (P.equipped.physical||[]).includes("anchor") ? 1.03 : 1.00;

  const pr = pressurePenalty(P);

  let touches=0;
  const line = {passY:0, passTD:0, int:0, rushY:0, rushTD:0, recY:0, recTD:0, tkl:0, sack:0, defINT:0};
  let scoreNudge=0;

  const role = P.role;
  const roleMult = role==="Starter" ? 1.00 : (role==="Rotation" ? 0.62 : 0.28);

  if(pos==="QB"){
    const att = Math.round(U.clamp(30 + (ovr-70)*0.35 + U.rint(-6,6), 18, 46) * roleMult);
    touches += att;

    const acc = U.clamp(((P.attrs.SAC+P.attrs.MAC+P.attrs.DAC)/3)/100, 0.48, 0.78);
    const accEff = U.clamp((acc*(1 - pr))*clutchMult, 0.40, 0.80);

    const ypa = U.clamp(6.2 + (P.attrs.THP-70)*0.05 + (P.attrs.DAC-70)*0.03 + (strongarm?0.2:0) + U.rint(-2,2)*0.12, 4.8, 10.8);
    line.passY = Math.round(att * accEff * ypa);

    const tdRate = U.clamp(0.035 + (ovr-72)*0.0012 + (extraRisk>0?0.006:0), 0.02, 0.10);
    line.passTD = Math.max(0, sampleCountFromExpected(att * tdRate * accEff));

    const hasFG = (P.equipped.mental||[]).includes("fieldgeneral");
    const hasComp = (P.equipped.mental||[]).includes("composure");

    let intRate = 0.012
      + (1 - (P.attrs.AWR/110)) * 0.020
      + pr * 0.030
      + (extraRisk * 0.010);

    if(hasFG) intRate -= 0.004;
    if(hasComp) intRate -= 0.003;

    intRate = U.clamp(intRate, 0.004, 0.055);
    line.int = Math.max(0, sampleCountFromExpected(att * intRate));

    const runAtt = Math.round(U.clamp(4 + (P.attrs.SPD-70)*0.06 + U.rint(-2,3), 1, 12) * roleMult);
    touches += runAtt;
    line.rushY = Math.round(runAtt * U.clamp(3.8 + (P.attrs.ACC-70)*0.03 + (takeoff?0.2:0) + U.rint(-2,2)*0.12, 2.8, 7.0));
    line.rushTD = Math.random() < U.clamp(0.05 + runAtt*0.01, 0.04, 0.18) ? 1 : 0;

    scoreNudge += Math.round((line.passY/55) + (line.rushY/35) + line.passTD*2.2 + line.rushTD*2.2 - line.int*2.2);
  }
  else if(pos==="RB"){
    const carries = Math.round(U.clamp(16 + (ovr-72)*0.25 + U.rint(-5,5), 6, 28) * roleMult);
    touches += carries;
    const ypc = U.clamp(3.6 + (P.attrs.ELU-70)*0.03*quick + (P.attrs.BTK-70)*0.02*downhill + U.rint(-2,2)*0.15, 2.5, 6.6);
    line.rushY = Math.round(carries * ypc);
    line.rushTD = Math.round(U.clamp(line.rushY/95 + (Math.random()<0.25?1:0), 0, 4));
    const targets = Math.round(U.clamp(3 + (P.attrs.CTH-70)*0.05 + U.rint(-1,2), 0, 7) * roleMult);
    touches += targets;
    line.recY = Math.round(targets * U.clamp(7.0 + (P.attrs.CTH-70)*0.03, 5.5, 10.5));
    line.recTD = (Math.random()<U.clamp(0.04 + targets*0.02, 0.02, 0.18)) ? 1 : 0;
    scoreNudge += Math.round((line.rushY/38) + (line.recY/60) + (line.rushTD+line.recTD)*2.2);
  }
  else if(pos==="WR" || pos==="TE"){
    const targets = Math.round(U.clamp(7 + (ovr-72)*0.22 + U.rint(-3,4), 2, 14) * roleMult);
    touches += targets;
    const catchRate = U.clamp(((P.attrs.CTH + (P.attrs.CIT||70)*0.6 + (P.attrs.SPC||70)*0.4)/2.2)/100, 0.45, 0.78);
    const sep = U.clamp((((P.attrs.SRR||70)+(P.attrs.MRR||70)+(P.attrs.DRR||70))/3)/100, 0.45, 0.85);
    const eff = U.clamp(catchRate * (0.82 + sep*0.28) * (1 - pr*0.35) * clutchMult, 0.35, 0.85);
    const ypt = U.clamp(9.0 + (P.attrs.SPD-70)*0.05 + ((P.attrs.DRR||70)-70)*0.03 + U.rint(-2,2)*0.15, 6.5, 16.0);
    line.recY = Math.round(targets * eff * ypt);
    line.recTD = Math.round(U.clamp(line.recY/120 + (Math.random()<0.18?1:0), 0, 3));
    scoreNudge += Math.round((line.recY/45) + line.recTD*2.2);
  }
  else if(pos==="OL"){
    const olImpact = U.clamp((ovr-70)*0.20 + (anchor?1.4:0) + U.rint(-2,2)*0.35, -2, 6);
    scoreNudge += Math.round(olImpact);
    touches += Math.round(18 * roleMult);
  }
  else {
    const snaps = Math.round(U.clamp(55 + U.rint(-10,10), 40, 75) * roleMult);
    touches += Math.round(snaps/2.2);
    const tackleRate = U.clamp(0.08 + (ovr-70)*0.002 + (P.attrs.TAK? (P.attrs.TAK-70)*0.0015 : 0), 0.06, 0.18);
    line.tkl = Math.round(snaps * tackleRate);
    const sackRate = (pos==="DL"||pos==="LB") ? U.clamp(0.012 + (ovr-72)*0.0008 + (((P.attrs.POW||70)+(P.attrs.FIN||70)-140)*0.00035), 0.008, 0.05) : 0;
    line.sack = sampleCountFromExpected(snaps * sackRate);
    const intRate = (pos==="CB"||pos==="S"||pos==="LB") ? U.clamp(0.005 + (ovr-74)*0.0005 + (((P.attrs.PRC||70)-70)*0.0005), 0.004, 0.03) : 0;
    const hasHawk = (P.equipped.mental||[]).includes("ballhawk");
    line.defINT = sampleCountFromExpected(snaps * intRate * (hasHawk?1.35:1.0));
    scoreNudge += Math.round(line.sack*0.9 + line.defINT*2.0);
  }

  const inj = injuryRoll(P, touches);
  P.fatigue = fatigueAfterTouches(P, touches);

  return {line, scoreNudge, touches, injury:inj};
}

function currentUserGame(){
  if(!S?.college?.schedule) return null;
  return S.college.schedule.find(g=>g.week===S.week && g.week>=1 && g.week<=GAME.REG_GAMES) || null;
}

function ensureMomentsAttached(game){
  if(!game.moments || !game.moments.length){
    const team=getTeam(S.teamId);
    const opp=getTeam(game.oppId);
    game.moments = genPlayerSpecificMoments(team, opp, S.player.pos);
    game.momentsPlayed = false;
    game.momentsLog = [];
    game.momentBonus = { score:0, line:{} };
  }
}

function canPlayMomentsNow(){
  if(!S?.settings?.keyMomentsOn) return false;
  if(S.phase!=="college") return false;
  if(!(S.week>=1 && S.week<=GAME.REG_GAMES)) return false;
  const game=currentUserGame();
  if(!game || game.played) return false;
  if(game.momentsPlayed) return false;
  return true;
}

function momentCountForGame(team, opp){
  const close = Math.abs(team.ovr-opp.ovr)<=6;
  const base = close ? 3 : 2;
  // more moments for “star” situations
  const extra = Math.random()<0.30 ? 1 : 0;
  return U.clamp(base + extra, 2, 4);
}

function momentPoolForPos(pos){
  if(pos==="QB") return ["3rd_long","redzone_pass","2min_drive","4th_down","backed_up"];
  if(pos==="RB") return ["goal_line_run","3rd_short","screen","pass_pro","open_field"];
  if(pos==="WR" || pos==="TE") return ["3rd_medium","redzone_target","deep_shot","2min_target","4th_down_target"];
  if(pos==="OL") return ["pass_set","run_block","goal_line_push","backed_up_protect","4th_short_push"];
  // Defense
  return ["3rd_down_stop","redzone_stop","blitz_moment","turnover_chance","goal_line_stand"];
}

    {id:"safe",   name:safeName,  risk:safeRisk,  impact:safeImpact,  desc:safeDesc},
    {id:"normal", name:normName,  risk:normRisk,  impact:normImpact,  desc:normDesc},
    {id:"shot",   name:aggrName,  risk:aggrRisk,  impact:aggrImpact,  desc:aggrDesc},

  // QB
  if(pos==="QB"){
    if(type==="3rd_long") return C("Checkdown/Smart", "Progression", "Force It Deep",

      "Safer; modest impact", "Best balance", "Higher impact; higher whiff risk",

      "Avoid fumble", "Balanced", "Big play; more fumble risk",

  // WR/TE
  if(pos==="WR" || pos==="TE"){
    if(type==="3rd_medium") return C("Sit In Zone", "Sharp Break", "Double Move",
      "Get open; move chains", "Balanced", "Chunk play; higher incompletion/INT risk (QB)",

      "Higher catch rate", "Balanced", "TD swing; more contested catch variance",

    if(type==="deep_shot") return C("Clear Out", "Stack Release", "Go Route",
      "Help spacing", "Balanced", "Big play; higher miss/INT risk (QB)",

    if(type==="2min_target") return C("Sideline Toe Tap", "Middle Dig", "Seam Shot",
      "Stop clock; safe", "Balanced", "Explosive; more risk",

  // OL

      "Lower penalty/whiff risk", "Balanced", "Big win chance; can lose badly",

function genPlayerSpecificMoments(team, opp, pos){
  const n = momentCountForGame(team, opp);
  const pool = momentPoolForPos(pos).slice();
  const moments = [];
  for(let i=0;i<n;i++){
    const type = pool[Math.floor(Math.random()*pool.length)];
    moments.push({
      id:U.uuid(),
      type,
      title: momentTitle(type, pos),
      done:false,
      choices: choicesForMoment(type, pos),
    });
  }
  return moments;
}

function applyMomentChoice(game, momentId, choiceId){
  const m = (game.moments||[]).find(x=>x.id===momentId);
  if(!m || m.done) return;

  const choice = (m.choices||[]).find(c=>c.id===choiceId) || m.choices[1];
  const team=getTeam(S.teamId);
  const opp=getTeam(game.oppId);
  const P=S.player;

  // clutch-ish when close or 2-min types
  const isClutch = (m.type.includes("2min") || m.type.includes("4th") || Math.abs(team.ovr-opp.ovr)<=4) && Math.random()<0.70;
  const ctx={isClutch, neutral:false};

  // extraRisk is mainly meaningful for QB pass decisions; for other positions it nudges volatility
  let extraRisk = 0;
  if(choiceId==="safe") extraRisk = -0.20;
  if(choiceId==="normal") extraRisk = 0.00;
  if(choiceId==="shot") extraRisk = 0.35;

  const riskForQB = (P.pos==="QB") ? Math.max(0, extraRisk) : 0;

  // get a burst line from your position contribution (already position-aware)
  const burst = playerContribution(P, team, opp, ctx, riskForQB);

  // scale per position so OL/DEF doesn’t dominate scoreboard; still matters
  const baseScale = (P.pos==="QB") ? 0.26 : (P.pos==="RB" ? 0.24 : ((P.pos==="WR"||P.pos==="TE") ? 0.24 : (P.pos==="OL" ? 0.18 : 0.20)));
  const scale = baseScale * choice.impact;

  // convert burst to “moment slice”
  const scaledLine = {
    passY: Math.round((burst.line.passY||0)*scale),
    passTD: sampleCountFromExpected((burst.line.passTD||0)*scale),
    int: sampleCountFromExpected((burst.line.int||0)*scale * (choiceId==="safe"?0.65:(choiceId==="shot"?1.35:1.0))),
    rushY: Math.round((burst.line.rushY||0)*scale),
    rushTD: sampleCountFromExpected((burst.line.rushTD||0)*scale),
    recY: Math.round((burst.line.recY||0)*scale),
    recTD: sampleCountFromExpected((burst.line.recTD||0)*scale),
    tkl: Math.round((burst.line.tkl||0)*scale),
    sack: sampleCountFromExpected((burst.line.sack||0)*scale),
    defINT: sampleCountFromExpected((burst.line.defINT||0)*scale),
  };

  // score swing: offense gets positive expected; defense can be positive by preventing points
  let scoreSwing = 0;

  const isOffensePos = (P.pos==="QB"||P.pos==="RB"||P.pos==="WR"||P.pos==="TE"||P.pos==="OL");

  if(isOffensePos){
    // offense moment: reflect your burst scoring nudge; keep it tight
    scoreSwing = Math.round(U.clamp(burst.scoreNudge*0.20*choice.impact, -3, +6));

    // goal line types give more TD variance
    if(m.type.includes("goal_line") || m.type.includes("redzone")){
      scoreSwing += (Math.random() < U.clamp(0.24*choice.impact, 0.10, 0.45)) ? 3 : 0;
    }
    // backed up: can go wrong fast
    if(m.type.includes("backed_up")){
      if(choiceId==="shot" && Math.random()<0.14){ scoreSwing += 3; }
      if(choiceId==="shot" && Math.random()<0.12){ scoreSwing -= 3; if(P.pos==="QB") scaledLine.int += 1; }
    }
    // OL protection moments reduce bad stuff on safe calls
    if(P.pos==="OL" && (m.type.includes("protect") || m.type.includes("pass_set"))){
      if(choiceId==="safe" && P.pos==="QB"){ scaledLine.int = Math.max(0, scaledLine.int-1); }
      if(choiceId==="safe") scoreSwing += 0; // stability
    }
  } else {
    // defense moment: you win by preventing points / creating splash
    // Treat positive swing as “helped your team” and apply as scoreSwing too.
    let stopChance = 0.55 * choice.impact;
    if(choiceId==="safe") stopChance += 0.05;
    if(choiceId==="shot") stopChance -= 0.05;

    stopChance = U.clamp(stopChance + (P.ovr-75)*0.004, 0.25, 0.80);
    const gotStop = Math.random() < stopChance;

    if(gotStop){
      scoreSwing += 0; // stop prevents opponent points, but we’ll reflect by reducing opp later
    } else {
      scoreSwing -= 3; // gave up points
    }

    // create splash plays on aggressive calls
    if(choiceId==="shot" && Math.random()<0.18){
      scoreSwing += 3;
      if(P.pos==="DL"||P.pos==="LB") scaledLine.sack += 1;
      if(P.pos==="CB"||P.pos==="S"||P.pos==="LB") scaledLine.defINT += (Math.random()<0.35?1:0);
    }

    // translate “defense helps” into slightly lowering opp score later by using negative opp add (handled in simUserGame)
    // We store as scoreSwing and interpret in simUserGame.
  }

  game.momentBonus.score += scoreSwing;
  addInto(game.momentBonus.line, scaledLine);

  game.momentsLog.push({
    title:m.title,
    choice:choice.name,
    scoreSwing,
    line:scaledLine
  });

  m.done=true;

  if(choiceId==="safe") P.fatigue = U.clamp((P.fatigue||0) * 0.95, 0, 100);
}

function skipAllMomentsThisGame(game){
  game.momentsPlayed = true;
  game.moments = game.moments || [];
  for(const m of game.moments) m.done=true;
  game.momentsLog = game.momentsLog || [];
  toast("Key Moments", "Skipped for this game.", "warn");
}

function awardEvaluation(){
  const P=S.player;
  const s=P.seasonStats;
  const t=getTeam(S.teamId);

  const awards = awardPack();
  const pos=P.pos;

  const g=t.season.g||1;
  const winPct=t.season.w/g;

  let score=0;
  if(pos==="QB"){
    score = s.passY*0.06 + s.passTD*6 - s.int*5 + s.rushY*0.02 + (t.season.w*10);
  } else if(pos==="RB"){
    score = s.rushY*0.07 + s.rushTD*7 + s.recY*0.02 + (t.season.w*8);
  } else if(pos==="WR"||pos==="TE"){
    score = s.recY*0.08 + s.recTD*9 + (t.season.w*7);
  } else if(pos==="OL"){
    score = (t.season.w*14) + (t.season.pf - t.season.pa)*0.25;
  } else {
    score = s.tkl*2.2 + s.sack*12 + s.defINT*18 + (t.season.w*6);
  }

  if(score > 900 || (winPct>0.75 && score>720)) awards.allConf=1;
  if(score > 1200 || (winPct>0.85 && score>980)) awards.allAmerican=1;
  if(score > 1100) awards.poty=true;
  if(score > 1400) awards.heisman=true;

  return awards;
}

function top5ConfChamps(){
  const byConf={};
  for(const tm of S.league.teams) (byConf[tm.conf]??=[]).push(tm);

  const champs=[];
  for(const [conf,list] of Object.entries(byConf)){
    if(list.length<2) continue;
    const sorted=list.slice().sort((a,b)=>{
      const aG=(a.season.confW+a.season.confL)||0;
      const bG=(b.season.confW+b.season.confL)||0;
      const aPct=aG? a.season.confW/aG : 0;
      const bPct=bG? b.season.confW/bG : 0;
      if(bPct!==aPct) return bPct-aPct;
      if(b.season.w!==a.season.w) return b.season.w-a.season.w;
      return teamScore(b)-teamScore(a);
    });
    champs.push({conf, teamId:sorted[0].id, score:teamScore(sorted[0])});
  }
  champs.sort((a,b)=>b.score-a.score);
  return champs.slice(0,5);
}

function buildCFP(){
  computePolls();

  const champs=top5ConfChamps();
  const champSet=new Set(champs.map(x=>x.teamId));

  const ranked = S.league.teams.slice().sort((a,b)=>{
    const ra = (a.cfpRank && a.cfpRank<999) ? a.cfpRank : a.apRank;
    const rb = (b.cfpRank && b.cfpRank<999) ? b.cfpRank : b.apRank;
    return ra-rb;
  });

  const field=[];
  for(const c of champs) field.push({teamId:c.teamId, auto:true, conf:c.conf});
  for(const t of ranked){
    if(field.length>=12) break;
    if(champSet.has(t.id)) continue;
    field.push({teamId:t.id, auto:false, conf:t.conf});
  }

  const seeded = field.slice().sort((a,b)=>{
    const A=getTeam(a.teamId), B=getTeam(b.teamId);
    const ra = (A.cfpRank && A.cfpRank<999) ? A.cfpRank : A.apRank;
    const rb = (B.cfpRank && B.cfpRank<999) ? B.cfpRank : B.apRank;
    return ra-rb;
  }).map((x,i)=>({...x, seed:i+1}));

  const r1 = [
    {a:seeded[4], b:seeded[11], res:null},
    {a:seeded[5], b:seeded[10], res:null},
    {a:seeded[6], b:seeded[9],  res:null},
    {a:seeded[7], b:seeded[8],  res:null},
  ];

  S.post.cfp = {
    year:S.meta.year,
    field:seeded,
    r1, qf:[], sf:[], title:null,
    champId:null,
    scoresByRound:{ r1:[], qf:[], sf:[], title:[] },
    built:true,
  };
}

function playCFPRoundExact(week){
  const B=S.post.cfp;
  if(!B || !B.built) return;

  if(week===GAME.CFP_R1_WEEK){
    for(const m of B.r1){
      const A=getTeam(m.a.teamId), C=getTeam(m.b.teamId);
      const res=simNeutralGame(A,C);
      m.res=res;
      recordPostScore("r1", A, C, res.aScore, res.bScore);
    }
    const seed=(n)=>B.field[n-1].teamId;
    const w5_12=B.r1[0].res.winId, w6_11=B.r1[1].res.winId, w7_10=B.r1[2].res.winId, w8_9=B.r1[3].res.winId;
    B.qf = [
      {a:{teamId:seed(1)}, b:{teamId:w8_9}, res:null},
      {a:{teamId:seed(4)}, b:{teamId:w5_12}, res:null},
      {a:{teamId:seed(2)}, b:{teamId:w7_10}, res:null},
      {a:{teamId:seed(3)}, b:{teamId:w6_11}, res:null},
    ];
    return;
  }

  if(week===GAME.CFP_QF_WEEK){
    const winners=[];
    for(const m of B.qf){
      const A=getTeam(m.a.teamId), C=getTeam(m.b.teamId);
      const res=simNeutralGame(A,C);
      m.res=res;
      winners.push(res.winId);
      recordPostScore("qf", A, C, res.aScore, res.bScore);
    }
    B.sf=[
      {a:{teamId:winners[0]}, b:{teamId:winners[1]}, res:null},
      {a:{teamId:winners[2]}, b:{teamId:winners[3]}, res:null},
    ];
    return;
  }

  if(week===GAME.CFP_SF_WEEK){
    const winners=[];
    for(const m of B.sf){
      const A=getTeam(m.a.teamId), C=getTeam(m.b.teamId);
      const res=simNeutralGame(A,C);
      m.res=res;
      winners.push(res.winId);
      recordPostScore("sf", A, C, res.aScore, res.bScore);
    }
    B.title={a:{teamId:winners[0]}, b:{teamId:winners[1]}, res:null};
    return;
  }

  if(week===GAME.CFP_TITLE_WEEK){
    const m=B.title;
    const A=getTeam(m.a.teamId), C=getTeam(m.b.teamId);
    const res=simNeutralGame(A,C);
    m.res=res;
    B.champId=res.winId;
    recordPostScore("title", A, C, res.aScore, res.bScore);
    return;
  }
}

/* ==========================================================
  Player creation + HS
========================================================== */
function initPlayer({name,pos,archId,stars}){
  const arch = baseArchetypes(pos).find(a=>a.id===archId) || baseArchetypes(pos)[0];
  const attrs={};

  const starBase = {2:62,3:68,4:74,5:80}[stars] ?? 68;

  for(const k of allAttrsForPos(pos)){
    const base = starBase + (CORE.includes(k)?U.rint(-4,+6):U.rint(-6,+8));
    attrs[k]=U.clamp(base, 40, 92);
  }
  if(arch?.bias){
    for(const [k,delta] of Object.entries(arch.bias)){
      if(attrs[k]==null) attrs[k]=U.clamp(starBase + U.rint(-6,+8), 40, 92);
      attrs[k]=U.clamp(attrs[k]+delta, 40, 95);
    }
  }
  attrs.INJ = U.clamp((attrs.INJ||70) + U.rint(-5,+5), 45, 95);

  const P = {
    id:U.uuid(),
    name,
    pos,
    arch: {id:arch?.id||"custom", name:arch?.name||"Custom"},
    stars,
    attrs,
    ovr: calcOVR(pos, attrs),
    yearIdx: 0,
    role:"Bench",
    fatigue:0,
    injury:{weeks:0, note:""},
    equipped:{ physical:[], mental:[] },
    unlocked:{ physical:{}, mental:{} },
    xp:0,
    attrPoints: 0,
    seasonStats: blankStatTotals(),
    career:{
      stats: blankStatTotals(),
      awards: { heisman:0, allAmerican:0, allConf:0, poty:0 },
      gwd:0,
      clutchPlays:0,
      schools:[],
    }
  };

  for(const a of ABIL.physical) P.unlocked.physical[a.id]=false;
  for(const a of ABIL.mental) P.unlocked.mental[a.id]=false;

  return P;
}

function refreshAbilityUnlocks(){
  const P=S.player;
  for(const a of ABIL.physical){
    if(!P.unlocked.physical[a.id] && a.req(P)) P.unlocked.physical[a.id]=true;
  }
  for(const a of ABIL.mental){
    if(!P.unlocked.mental[a.id] && a.req(P)) P.unlocked.mental[a.id]=true;
  }
}

function addXP(amt){
  const P=S.player;
  if(S.settings.infiniteAttrPoints){
    P.attrPoints = 999;
    P.xp = 0;
    return;
  }
  P.xp += Math.round(amt * U.clamp(S.settings.xpMult||1, 0.5, 4));
  while(P.xp >= 100){
    P.xp -= 100;
    P.attrPoints += 1;
    toast("Attribute Point", "+1 attribute point earned.", "good");
  }
}

function hsOppStrength(week){
  const base=66 + week*1.2;
  return U.clamp(Math.round(base + U.rint(-8,+10)), 55, 92);
}

function simHSGame(){
  const P=S.player;
  const wk=S.week;
  const opp=hsOppStrength(wk);

  const isQB = P.pos==="QB";
  const isRB = P.pos==="RB";
  const isWR = (P.pos==="WR"||P.pos==="TE");
  const isDEF = (P.pos==="DL"||P.pos==="LB"||P.pos==="CB"||P.pos==="S");

  const starMult = 0.92 + (P.stars-2)*0.07;
  const oppMult = U.clamp(1.05 - (opp-70)*0.010, 0.70, 1.15);

  const line = {passY:0, passTD:0, int:0, rushY:0, rushTD:0, recY:0, recTD:0, tkl:0, sack:0, defINT:0};

  if(isQB){
    const att = U.clamp(26 + U.rint(-6,6), 18, 38);
    const acc = U.clamp(((P.attrs.SAC+P.attrs.MAC+P.attrs.DAC)/3)/100, 0.50, 0.85);
    const ypa = U.clamp(6.6 + (P.attrs.THP-70)*0.05 + U.rint(-2,2)*0.14, 5.2, 11.5);
    line.passY = Math.round(att * acc * ypa * starMult * oppMult);
    line.passTD = Math.round(U.clamp(line.passY/140 + (Math.random()<0.35?1:0), 0, 6));

    const intRate = U.clamp(0.010 + (1 - (P.attrs.AWR/115))*0.020, 0.004, 0.045);
    line.int = sampleCountFromExpected(att * intRate * (1 - (P.attrs.AWR||70)/160));

    const runAtt = U.clamp(5 + U.rint(-2,4), 1, 12);
    line.rushY = Math.round(runAtt * U.clamp(4.1 + (P.attrs.SPD-70)*0.03, 3.1, 6.8) * starMult * oppMult);
    line.rushTD = (Math.random()<0.20)?1:0;
  } else if(isRB){
    const car = U.clamp(18 + U.rint(-5,6), 10, 30);
    line.rushY = Math.round(car * U.clamp(4.2 + (P.attrs.ELU-70)*0.03, 3.0, 7.2) * starMult * oppMult);
    line.rushTD = Math.round(U.clamp(line.rushY/110 + (Math.random()<0.30?1:0), 0, 5));
    const tgt = U.clamp(3 + U.rint(-1,2), 0, 6);
    line.recY = Math.round(tgt * U.clamp(9.0 + (P.attrs.CTH-70)*0.03, 6.5, 12.5) * starMult * oppMult);
    line.recTD = (Math.random()<0.15)?1:0;
  } else if(isWR){
    const tgt = U.clamp(8 + U.rint(-3,4), 3, 14);
    const catchRate = U.clamp(((P.attrs.CTH + (P.attrs.CIT||70)*0.6 + (P.attrs.SPC||70)*0.4)/2.2)/100, 0.45, 0.85);
    line.recY = Math.round(tgt * catchRate * U.clamp(11 + (P.attrs.SPD-70)*0.06, 7.0, 18.5) * starMult * oppMult);
    line.recTD = Math.round(U.clamp(line.recY/140 + (Math.random()<0.30?1:0), 0, 4));
  } else if(isDEF){
    const snaps = U.clamp(62 + U.rint(-10,10), 45, 80);
    line.tkl = Math.round(snaps * U.clamp(0.10 + (P.attrs.TAK? (P.attrs.TAK-70)*0.0012:0), 0.07, 0.18) * starMult * (2-oppMult));
    line.sack = sampleCountFromExpected(snaps * (P.pos==="DL"||P.pos==="LB" ? U.clamp(0.020 + (P.ovr-70)*0.0009, 0.012, 0.06) : 0));
    line.defINT = sampleCountFromExpected(snaps * (P.pos==="CB"||P.pos==="S" ? U.clamp(0.010 + (P.ovr-70)*0.0007, 0.006, 0.035) : 0));
  }

  const xp = Math.round(
    (line.passY*0.08 + line.passTD*25 - line.int*18) +
    (line.rushY*0.10 + line.rushTD*28) +
    (line.recY*0.11 + line.recTD*30) +
    (line.tkl*8 + line.sack*35 + line.defINT*55)
  );
  addXP(xp);

  addLineToTotals(P.seasonStats, line);
  addLineToTotals(P.career.stats, line);

  if(Math.random()<0.25 && (line.passTD+line.rushTD+line.recTD)>=3) P.career.clutchPlays = (P.career.clutchPlays||0)+1;

  const myPts = U.clamp(Math.round(20 + (P.ovr-60)*0.45 + (xp/220) + U.rint(-7,7)), 7, 63);
  const oppPts = U.clamp(Math.round(17 + (opp-65)*0.40 + U.rint(-7,7)), 3, 56);
  const win = myPts>oppPts;

  S.hs.log.push({wk, opp, myPts, oppPts, line});
  toast(win?"HS Win":"HS Loss", `Game ${wk}: ${myPts}-${oppPts} vs Opp (OVR ${opp})`, win?"good":"bad");

  refreshAbilityUnlocks();

  S.week += 1;
  if(S.week > GAME.HS_GAMES){
    S.phase="recruiting";
    S.week=0;
    generateScholarshipOffers();
    S.player.seasonStats = blankStatTotals();
    S.player.fatigue = 0;
    toast("HS Complete", "Scholarships are in.", "good");
  }
}

/* ==========================================================
  Recruiting (Bottom-25 rule removed)
========================================================== */
function generateScholarshipOffers(){
  const P=S.player;
  const all=S.league.teams.slice();

  const tot=P.career.stats;
  const perf = (tot.passY*0.05 + tot.passTD*22 - tot.int*18) +
               (tot.rushY*0.07 + tot.rushTD*28) +
               (tot.recY*0.08 + tot.recTD*30) +
               (tot.tkl*6 + tot.sack*32 + tot.defINT*55);
  const perfScaled = Math.round(perf);
  const starBase = P.stars;

  // Everyone is eligible. Offer probability scales with fit.
  const offers = all
    .map(t=>{
      const fit = U.clamp(
        52 + (starBase-3)*10 + (perfScaled/520) + (t.prestige-70)*0.25 + U.rint(-12,12),
        0, 100
      );
      const offerProb = U.clamp(0.10 + (fit/130), 0.08, 0.90);
      const offeredNow = Math.random()<offerProb;
      return {teamId:t.id, fit, offered:offeredNow};
    })
    .filter(x=>x.offered)
    .sort((a,b)=>b.fit-a.fit)
    .slice(0, 16);

  while(offers.length<8){
    const t = U.pick(all);
    if(offers.some(o=>o.teamId===t.id)) continue;
    offers.push({teamId:t.id, fit:U.clamp(50+U.rint(-10,15), 25, 90), offered:true});
  }
  offers.sort((a,b)=>b.fit-a.fit);

  S.recruiting.offers = offers;
  S.recruiting.committedTeamId = null;

  queueModal({
    type:"html",
    title:"SCHOLARSHIP OFFERS",
    icon:"📨",
    line:"Pick a school to commit.",
    html: `
      <div class="itemCard">
        <div class="itemTitle">Rule</div>
        <div class="itemMeta"><span class="badge bAcc">Any School</span> If you have an offer, you can commit. No start restriction.</div>
        <div class="itemMeta"><span class="badge bAcc2">Portal</span> Later you can transfer anywhere — but must win the job.</div>
      </div>
      <div class="sep"></div>
      <div class="list">
        ${offers.map(o=>{
          const t=getTeam(o.teamId);
          return `
            <div class="itemCard">
              <div class="itemTop">
                <div>
                  <div class="itemTitle">${U.safe(t.name)} <span class="badge bAcc2">${U.safe(t.conf)}</span></div>
                  <div class="itemMeta">Prest ${t.prestige} • Team OVR ${t.ovr} • Fit ${o.fit}/100</div>
                </div>
                <button class="btnGood" data-act="commit" data-team="${t.id}">Commit</button>
              </div>
            </div>
          `;
        }).join("")}
      </div>
    `
  });
}

/* ==========================================================
  College season engine
========================================================== */
function resetTeamSeason(team){
  team.season={w:0,l:0,pf:0,pa:0,confW:0,confL:0,g:0};
}
function resetLeagueSeason(){
  for(const t of S.league.teams) resetTeamSeason(t);
}

function startCollegeSeason(){
  const P=S.player;

  resetLeagueSeason();
  S.phase="college";
  S.week=0;
  S.college.schedule = buildScheduleForTeam(S.teamId);
  S.college.postBuilt=false;
  S.post.cfp=null;

  const team=getTeam(S.teamId);
  const baseRoleScore = (P.ovr + P.stars*3) - (team.ovr*0.25) + U.rint(-5,5);
  P.role = baseRoleScore>=74 ? "Starter" : (baseRoleScore>=66 ? "Rotation" : "Bench");
  P.fatigue=0;
  P.injury={weeks:0,note:""};
  P.seasonStats = blankStatTotals();
  computePolls();
}

function simLeagueWeek(excludeTeamId){
  const teams=S.league.teams.slice().sort(()=>Math.random()-0.5);
  const used=new Set();
  for(const t of teams){
    if(t.id===excludeTeamId) continue;
    if(used.has(t.id)) continue;
    const pool = teams.filter(x=>x.id!==t.id && x.id!==excludeTeamId && !used.has(x.id));
    if(!pool.length) continue;
    const opp=U.pick(pool);
    used.add(t.id); used.add(opp.id);

    const A=U.deepCopy(t); A._home=true;
    const B=U.deepCopy(opp); B._home=false;
    const res=simTeamVsOpp(A,B,false,randRangeSeason());
    applyTeamResult(t, opp, res.me, res.opp, (t.conf===opp.conf));
  }
}

function applyTeamResult(teamA, teamB, aPts, bPts, confGame){
  teamA.season.g++; teamB.season.g++;
  teamA.season.pf+=aPts; teamA.season.pa+=bPts;
  teamB.season.pf+=bPts; teamB.season.pa+=aPts;
  if(aPts>bPts){
    teamA.season.w++; teamB.season.l++;
    if(confGame){ teamA.season.confW++; teamB.season.confL++; }
  } else {
    teamB.season.w++; teamA.season.l++;
    if(confGame){ teamB.season.confW++; teamA.season.confL++; }
  }
}

function simUserGame(){
  const P=S.player;
  const t=getTeam(S.teamId);
  const game = currentUserGame();
  if(!game) return;

  // moments gate
  if(canPlayMomentsNow()){
    openKeyMomentsModal();
    return;
  }

  // injury skip
  if(P.injury.weeks>0){
    P.injury.weeks -= 1;
    const opp=getTeam(game.oppId);
    const absentPenalty = (P.pos==="QB")? -4 : (P.pos==="OL"? -2 : -1);
    const meSim = U.deepCopy(t); meSim.off=U.clamp(meSim.off+absentPenalty, 20, 99); meSim._home=game.home;
    const oppSim = U.deepCopy(opp); oppSim._home=!game.home;
    const res=simTeamVsOpp(meSim, oppSim, false, randRangeSeason());
    game.played=true; game.mePts=res.me; game.oppPts=res.opp;
    game.injuryNote = `Out: ${P.injury.note}`;
    applyTeamResult(t, opp, res.me, res.opp, game.confGame);
    toast("Injury", `Missed game vs ${opp.name} (${P.injury.note})`, "warn");
    computePolls();
    return;
  }

  ensureMomentsAttached(game);

  const opp=getTeam(game.oppId);
  const meSim=U.deepCopy(t); meSim._home=game.home;
  const oppSim=U.deepCopy(opp); oppSim._home=!game.home;

  const tight = Math.abs(t.ovr-opp.ovr)<=4;
  const context = {isClutch: tight && Math.random()<0.45, neutral:false};

  const base = simTeamVsOpp(meSim, oppSim, false, randRangeSeason());
  const contrib = playerContribution(P, t, opp, context, 0);

  const momentScore = game.momentBonus?.score || 0;
  const momentLine = game.momentBonus?.line || {};

  const combinedLine = U.deepCopy(contrib.line);
  addInto(combinedLine, momentLine);

  const mePts = U.clamp(base.me + U.clamp(contrib.scoreNudge, -4, +10) + U.clamp(momentScore, -6, +10), 3, 62);

  // defense moments should reduce opp scoring more often; treat positive momentScore as “help you”:
  const oppAdj = (P.pos==="DL"||P.pos==="LB"||P.pos==="CB"||P.pos==="S")
    ? U.clamp(-Math.round(momentScore*0.60), -6, +4)
    : (momentScore<0 ? 1 : 0);

  const oppPts = U.clamp(base.opp + U.rint(-2,2) + oppAdj, 3, 62);
  const finalMe = (mePts===oppPts) ? mePts+1 : mePts;

  game.played=true;
  game.mePts=finalMe;
  game.oppPts=oppPts;
  game.playerLine=combinedLine;
  game.injuryNote="";

  addLineToTotals(P.seasonStats, combinedLine);
  addLineToTotals(P.career.stats, combinedLine);

  if(context.isClutch && finalMe>oppPts && Math.random()<0.55){
    P.career.gwd = (P.career.gwd||0)+1;
    P.career.clutchPlays = (P.career.clutchPlays||0)+1;
  }

  P.fatigue = U.clamp((P.fatigue||0) * 0.72, 0, 100);

  if(contrib.injury.injured){
    P.injury.weeks = contrib.injury.weeks;
    P.injury.note = contrib.injury.note;
    game.injuryNote = `Injured: ${contrib.injury.note} (${contrib.injury.weeks}w)`;
    toast("Injury", `${contrib.injury.note} — out ${contrib.injury.weeks} week(s)`, "warn");
  }

  const xp = Math.round(
    (combinedLine.passY||0)*0.10 + (combinedLine.passTD||0)*28 - (combinedLine.int||0)*18 +
    (combinedLine.rushY||0)*0.12 + (combinedLine.rushTD||0)*30 +
    (combinedLine.recY||0)*0.13 + (combinedLine.recTD||0)*32 +
    (combinedLine.tkl||0)*8 + (combinedLine.sack||0)*36 + (combinedLine.defINT||0)*60
  );
  addXP(xp);

  checkRecordsAfterGame(combinedLine);

  applyTeamResult(t, opp, finalMe, oppPts, game.confGame);

  refreshAbilityUnlocks();

  const win = finalMe>oppPts;
  const kmTag = (S.settings.keyMomentsOn && game.momentsPlayed) ? " • Key Moments" : "";
  toast(win?"Win":"Loss", `${t.name} ${finalMe}-${oppPts} ${opp.name}${kmTag}`, win?"good":"bad");

  computePolls();
}

function simConferenceTitleWeek(){
  const byConf={};
  for(const tm of S.league.teams) (byConf[tm.conf]??=[]).push(tm);
  const results=[];
  for(const [conf,list] of Object.entries(byConf)){
    if(list.length<2) continue;
    const sorted=list.slice().sort((a,b)=>{
      const aG=(a.season.confW+a.season.confL)||0;
      const bG=(b.season.confW+b.season.confL)||0;
      const aPct=aG? a.season.confW/aG : 0;
      const bPct=bG? b.season.confW/bG : 0;
      if(bPct!==aPct) return bPct-aPct;
      if(b.season.w!==a.season.w) return b.season.w-a.season.w;
      return teamScore(b)-teamScore(a);
    });
    const A=sorted[0], B=sorted[1];
    const res=simNeutralGame(A,B,randRangeSeason());
    applyTeamResult(A,B,res.aScore,res.bScore,true);
    results.push({conf, A, B, res});
  }
  computePolls();
  return results;
}

function buildPortalOffers(){
  const P=S.player;
  const all=S.league.teams.slice();
  const curId=S.teamId;

  const prod = (P.seasonStats.passY*0.05 + P.seasonStats.passTD*26 - P.seasonStats.int*20) +
               (P.seasonStats.rushY*0.06 + P.seasonStats.rushTD*28) +
               (P.seasonStats.recY*0.07 + P.seasonStats.recTD*30) +
               (P.seasonStats.tkl*5 + P.seasonStats.sack*30 + P.seasonStats.defINT*55);

  const score = prod + (P.ovr*22) + (P.stars*120) + (P.role==="Starter"?220:0);

  let offers = all
    .filter(t=>t.id!==curId)
    .map(t=>{
      const fit = U.clamp(45 + (score/120) + (t.prestige-70)*0.30 + U.rint(-10,10), 0, 100);
      const p = U.clamp(0.08 + (fit/140), 0.06, 0.82);
      const wants = Math.random() < p;
      return {teamId:t.id, fit, wants};
    })
    .filter(x=>x.wants)
    .sort((a,b)=>b.fit-a.fit)
    .slice(0, 12);

  while(offers.length<5){
    const t=U.pick(all.filter(x=>x.id!==curId));
    if(offers.some(o=>o.teamId===t.id)) continue;
    offers.push({teamId:t.id, fit:U.clamp(55+U.rint(-10,12), 30, 88), wants:true});
  }
  offers.sort((a,b)=>b.fit-a.fit);

  S.portal.offers = offers;
  S.portal.entered = true;
}

function portalTransfer(teamId){
  const old = getTeam(S.teamId);
  const next = getTeam(teamId);
  S.teamId = teamId;
  S.player.career.schools.push({year:S.meta.year+1, school:next.name, conf:next.conf, transferFrom:old.name});
  toast("Transfer", `${old.name} → ${next.name}`, "good");
}

function offseasonTraining(){
  const P=S.player;
  const growth = 4 + U.rint(0,3);
  P.attrPoints += growth;
  toast("Training", `Offseason training +${growth} attribute points.`, "good");
  P.fatigue = 0;
}

function positionBattle(){
  const P=S.player;
  const team=getTeam(S.teamId);

  const competition = U.clamp(Math.round(team.ovr + (team.prestige-70)*0.12 + U.rint(-10, +10)), 55, 95);

  let eff = P.ovr;
  eff += ((P.attrs.AWR||70)-70)*0.20;
  eff += ((P.attrs.STA||70)>85)?1:0;
  if((P.equipped.mental||[]).includes("filmroom")) eff += 1;
  if((P.equipped.mental||[]).includes("fieldgeneral")) eff += 1;

  eff -= (diff()-1)*4.5;

  const delta = eff - competition;
  const pStart = U.clamp(0.30 + delta*0.04, 0.08, 0.92);
  const roll=Math.random();
  if(roll < pStart){
    P.role="Starter";
    toast("Depth Chart", "You won the starting job.", "good");
  } else if(roll < pStart + 0.30){
    P.role="Rotation";
    toast("Depth Chart", "You’re in the rotation.", "warn");
  } else {
    P.role="Bench";
    toast("Depth Chart", "You’re buried. You’ll need a big year or transfer.", "bad");
  }
}

/* ==========================================================
  Advance Engine
========================================================== */
function advance(){
  if(!S) return;
  if(S.ui.modalQueue.length) return;

  if(S.phase==="setup") return toast("Setup", "Create your player first.", "warn");

  if(S.phase==="hs"){
    if(S.week>=1 && S.week<=GAME.HS_GAMES){
      simHSGame();
      return;
    }
    if(S.week===0) S.week=1;
    simHSGame();
    return;
  }

  if(S.phase==="recruiting"){
    return toast("Recruiting", "Pick a scholarship offer to commit.", "warn");
  }

  if(S.phase==="college"){
    if(S.week===0){
      S.week=1;
      toast("College Season", "Week 1 is up.", "good");
      return;
    }

    if(S.week>=1 && S.week<=GAME.REG_GAMES){
      simUserGame();
      if(S.ui.modalQueue.length) return;

      simLeagueWeek(S.teamId);

      S.week += 1;

      if(S.week===GAME.CONF_TITLE_WEEK){
        toast("Next", "Conference Championship Week", "good");
      } else if(S.week<=GAME.REG_GAMES){
        toast("Next", weekName("college", S.week), "good");
      }
      return;
    }

    if(S.week===GAME.CONF_TITLE_WEEK){
      const results = simConferenceTitleWeek();
      const myTeam=getTeam(S.teamId);
      const inChamp = results.some(r=>r.A.id===myTeam.id || r.B.id===myTeam.id);
      queueModal({
        type:"milestone",
        title: inChamp ? "CONFERENCE TITLE GAME!" : "NO CONFERENCE TITLE",
        icon: inChamp ? "🏆" : "🧊",
        line: inChamp ? "Your team played for the conference championship." : "Your team did not qualify for the conference title game."
      });
      S.week = GAME.CFP_R1_WEEK;
      return;
    }

    if(S.week>=GAME.CFP_R1_WEEK && S.week<=GAME.CFP_TITLE_WEEK){
      if(S.week===GAME.CFP_R1_WEEK && !S.college.postBuilt){
        buildCFP();
        S.college.postBuilt=true;
        const myTeam=getTeam(S.teamId);
        const slot = S.post.cfp.field.find(x=>x.teamId===myTeam.id);
        queueModal({
          type:"milestone",
          title: slot ? "CFP SELECTION!" : "NO CFP",
          icon: slot ? "🏟️" : "🧊",
          line: slot ? `${myTeam.name} earned a CFP spot (Seed #${slot.seed}).` : `${myTeam.name} missed the CFP field.`
        });
        return;
      }

      playCFPRoundExact(S.week);

      if(S.week===GAME.CFP_TITLE_WEEK){
        const champ=getTeam(S.post.cfp.champId);
        toast("Champion", champ?`${champ.name} won it all.`:"Title complete.", "good");
        playoffScorePopup();
        enterOffseason();
        return;
      }

      S.week += 1;
      return;
    }
  }

  if(S.phase==="offseason"){
    const offStart = GAME.CFP_TITLE_WEEK+1;

    if(S.week===offStart){
      S.week=offStart+1;
      toast("Offseason", "Week 2: portal still open.", "good");
      return;
    }

    if(S.week===offStart+1){
      S.week=offStart+2;
      toast("Offseason", "Week 3: training.", "good");
      return;
    }

    if(S.week===offStart+2){
      offseasonTraining();
      S.week=offStart+3;
      toast("Offseason", "Week 4: position battle.", "good");
      return;
    }

    if(S.week===offStart+3){
      positionBattle();

      S.meta.year += 1;
      S.meta.collegeYearIdx += 1;

      if(S.meta.collegeYearIdx >= GAME.YEARS_COLLEGE){
        S.phase="career_end";
        queueModal({type:"career_end", title:"CAREER COMPLETE", icon:"🎓", line:"Senior year finished. Check awards + records.", subt:"Start a new RTG run if you want."});
        return;
      }

      S.player.yearIdx = S.meta.collegeYearIdx;
      startCollegeSeason();
      toast("New Year", `Welcome to Year ${S.meta.year} (${["FR","SO","JR","SR"][S.meta.collegeYearIdx]})`, "good");
      return;
    }
  }

  if(S.phase==="career_end"){
    return toast("Done", "Your career is complete. Reset to start over.", "warn");
  }
}

function spendAttrPoint(key){
  const P=S.player;
  if(P.attrPoints<=0 && !S.settings.infiniteAttrPoints) return toast("No Points","Earn more points first.","bad");
  const cur=P.attrs[key] ?? 50;
  if(cur>=99) return toast("Maxed", `${key} already 99.`, "bad");
  if(!S.settings.infiniteAttrPoints) P.attrPoints -= 1;
  const step = (cur>=90) ? 1 : (cur>=80?2:3);
  P.attrs[key]=U.clamp(cur+step, 40, 99);
  P.ovr = calcOVR(P.pos, P.attrs);
  refreshAbilityUnlocks();
}

function abilityReqText(id, kind){
  if(kind==="physical"){
    if(id==="takeoff") return "SPD ≥ 88 and ACC ≥ 86";
    if(id==="quickstep") return "AGI ≥ 86 and ACC ≥ 84";
    if(id==="workhorse") return "STA ≥ 88";
    if(id==="downhill") return "STR ≥ 84 and TRK ≥ 82";
    if(id==="anchor") return "STR ≥ 88 and you are OL/DL";
    if(id==="strongarm") return "QB and THP ≥ 88";
  } else {
    if(id==="composure") return "AWR ≥ 82 and 2+ clutch plays";
    if(id==="clutch") return "AWR ≥ 80 and 1+ game-winning drive";
    if(id==="filmroom") return "1+ All-Conference or All-American";
    if(id==="ballhawk") return "Defense and 4+ career INT";
    if(id==="routesavvy") return "WR/TE and 1200+ career receiving yards";
    if(id==="fieldgeneral") return "QB, AWR ≥ 86, and 2500+ career passing yards";
  }
  return "Play well + raise attributes.";
}

function renderAbilities(){

  refreshAbilityUnlocks();
  const slots=slotsForYear(S.meta.collegeYearIdx||0);

  const physList = ABIL.physical.map(a=>{
    const unlocked = !!P.unlocked.physical[a.id];
    const eq = (P.equipped.physical||[]).includes(a.id);
    const dis = !unlocked ? "disabled" : ((!eq && (P.equipped.physical||[]).length>=slots.phys) ? "disabled" : "");
    return `
      <div class="itemCard" style="${unlocked?'':'opacity:.72'}">
        <div class="itemTop">
          <div>
            <div class="itemTitle">${U.safe(a.icon)} ${U.safe(a.name)} ${eq?`<span class="badge bGood">EQUIPPED</span>`:""} ${unlocked?`<span class="badge bAcc2">Unlocked</span>`:`<span class="badge bWarn">Locked</span>`}</div>
            <div class="itemMeta">${U.safe(a.desc)}</div>
            ${!unlocked?`<div class="itemMeta"><span class="badge bWarn">Requirement</span> ${U.safe(abilityReqText(a.id,"physical"))}</div>`:""}
          </div>
          <button class="btnAccent" data-act="toggle_abil" data-kind="physical" data-id="${U.safe(a.id)}" ${dis}>${eq?"Unequip":"Equip"}</button>

    const dis = !unlocked ? "disabled" : ((!eq && (P.equipped.mental||[]).length>=slots.ment) ? "disabled" : "");
    return `

        <div class="itemTop">
          <div>
            <div class="itemTitle">${U.safe(a.icon)} ${U.safe(a.name)} ${eq?`<span class="badge bGood">EQUIPPED</span>`:""} ${unlocked?`<span class="badge bAcc2">Unlocked</span>`:`<span class="badge bWarn">Locked</span>`}</div>
            <div class="itemMeta">${U.safe(a.desc)}</div>
            ${!unlocked?`<div class="itemMeta"><span class="badge bWarn">Requirement</span> ${U.safe(abilityReqText(a.id,"mental"))}</div>`:""}

          <button class="btnAccent" data-act="toggle_abil" data-kind="mental" data-id="${U.safe(a.id)}" ${dis}>${eq?"Unequip":"Equip"}</button>

  return `

function renderCFP(){
  if(!S.player) return renderSetup();
  const B=S.post.cfp;
  if(!B) return `<div class="card"><h2>CFP Bracket</h2><div class="muted">No CFP bracket yet. Reach postseason first.</div></div>`;

  const seedMap = new Map(B.field.map(x=>[x.teamId, x.seed]));
  const teamName = (id)=> U.safe(getTeam(id)?.name||"—");
  const seedBadge = (id)=> seedMap.has(id)? `<span class="badge bAcc2">#${seedMap.get(id)}</span>`:"";

  const cardMatch=(m)=>{
    const aId=m.a.teamId, bId=m.b.teamId;
    const aN=teamName(aId), bN=teamName(bId);
    const s = m.res ? `${aN} ${m.res.aScore}-${m.res.bScore} ${bN}` : "Not played";
    const win = m.res ? (m.res.winId===aId?aN:bN) : null;
    return `
      <div class="itemCard">
        <div class="itemTitle">${seedBadge(aId)} ${aN} vs ${seedBadge(bId)} ${bN}</div>
        <div class="itemMeta">${m.res?`Final: <span class="badge bAcc">${U.safe(s)}</span> Winner: <span class="badge bGood">${U.safe(win)}</span>`:`<span class="muted">${U.safe(s)}</span>`}</div>
      </div>
    `;
  };

  const r1=B.r1||[], qf=B.qf||[], sf=B.sf||[], title=B.title;

  return `
    <div class="card">
      <div class="rowBetween">
        <h2>CFP Bracket — Year ${B.year}</h2>
        <span class="badge bAcc">${B.champId?`Champion: ${U.safe(getTeam(B.champId).name)}`:"In Progress"}</span>
      </div>
      <div class="sep"></div>

      <div class="bracket">
        <div>
          <div class="roundHdr">First Round</div>
          <div class="list">${r1.map(cardMatch).join("") || `<div class="muted">—</div>`}</div>
        </div>
        <div>
          <div class="roundHdr">Quarterfinals</div>
          <div class="list">${qf.map(cardMatch).join("") || `<div class="muted">—</div>`}</div>
        </div>
        <div>
          <div class="roundHdr">Semifinals</div>
          <div class="list">${sf.map(cardMatch).join("") || `<div class="muted">—</div>`}</div>
        </div>
        <div>
          <div class="roundHdr">National Championship</div>
          <div class="list">${title?cardMatch({a:title.a,b:title.b,res:title.res}):`<div class="muted">—</div>`}</div>
        </div>
      </div>

      <div class="sep"></div>
      <button class="btnAccent" data-act="show_playoff_scores">Show Playoff Score Summary</button>
    </div>
  `;
}

function populateArchetypes(){
  const pos=document.getElementById("p_pos")?.value || "QB";

  if(!archSel) return;
  const list=baseArchetypes(pos);
  archSel.innerHTML = list.map(a=>`<option value="${U.safe(a.id)}">${U.safe(a.name)} — ${U.safe(a.desc)}</option>`).join("");
}

function render(){
  updateSubline();
  renderDrawerNav();
  const app=document.getElementById("app");

  if(!S){ app.innerHTML = renderWelcome(); renderOverlay(); return; }

  const view = ({
    home: renderHome,
    player: renderPlayer,
    attributes: renderAttributes,
    abilities: renderAbilities,
    schedule: renderSchedule,
    rankings: renderRankings,
    cfp: renderCFP,
    awards: renderAwards,
    records: renderRecords,
    settings: renderSettings,
  }[activeTab] || renderHome)();

  app.innerHTML=view;
  renderOverlay();

  if(S.phase==="setup" && document.getElementById("p_pos")){
    populateArchetypes();
  }
}

  const ok = await STORE.set(GAME.SAVE_KEY, S);

  updateSubline();
